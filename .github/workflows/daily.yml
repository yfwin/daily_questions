name: 2026山东事业单位每日刷题

on:
  schedule:
    - cron: "0 0 * * *"   # 早 8:00 北京时间
    - cron: "0 12 * * *"  # 晚 20:00 北京时间
  workflow_dispatch:      # 允许手动测试

jobs:
  run-script:
    runs-on: ubuntu-22.04  # 更换为更稳定的运行器版本，减少排队概率
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests openai  # 新增openai依赖，确保客户端能正常运行
      - name: Run
        env:
          # 微信相关密钥（不变）
          APPID: ${{ secrets.APPID }}
          APPSECRET: ${{ secrets.APPSECRET }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
          OPENID: ${{ secrets.OPENID }}
          # OpenAI相关变量（适配你的配置，读取GitHub中设置的变量）
          API_KEY: ${{ secrets.API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
        run: python questions.py
